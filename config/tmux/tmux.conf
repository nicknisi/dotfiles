# vim:ft=tmux
# tmux display things in 256 colors
# set -g default-terminal "tmux-256color"

# Tell apps inside tmux they're talking to tmux, then layer truecolor on top
# via the standard RGB capability (tmux 3.2+) rather than the legacy Tc flag.
set -g default-terminal "tmux-256color"
set -as terminal-features ',xterm-ghostty:RGB'

# Propagate COLORTERM into panes so TUIs (Claude Code, etc.) detect truecolor.
# tmux drops it by default, which downgrades supports-color to a low color level.
set -ga update-environment "COLORTERM"

# enable italics
set -as terminal-overrides ',xterm*:sitm=\E[3m'

# Extended keys — allows Shift+Enter, Ctrl+Enter, etc. to pass through
# Required for pi (and other TUI apps) to distinguish modified Enter from plain Enter
set -g extended-keys always
set -g extended-keys-format csi-u
set -as terminal-features ',xterm-ghostty:extkeys'

# Enable undercurl
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'

# Enable undercurl colors
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# Forward escape sequences wrapped in the tmux DCS envelope to the outer
# terminal — lets snacks.image send kitty graphics through to ghostty.
set -g allow-passthrough on

set -g history-limit 20000

# automatically renumber tmux windows
set -g renumber-windows on

# update the status bar every X seconds
set-option -g status-interval 3

######################
#### General Settings ####
######################

 # set the prefix to control-a. This is more convenient than control-b
 # and 'a' is right next to Caps Lock (which I remap to control)
set -g prefix C-a
bind C-a send-prefix
bind-key a send-prefix

set -g set-clipboard on

# enable mouse support for switching panes/windows
setw -g mouse on

# make delay shorter
set -g escape-time 0
# make window/pane index start with 1
set -g base-index 1
setw -g pane-base-index 1
set-option -g focus-events on
set-option -g set-titles on

# set vi mode for copy mode
setw -g mode-keys vi
set -g status-keys vi

# automatically rename windows when an explicit name is not set
set-window-option -g automatic-rename on
set-option -g automatic-rename-format "#(tmux-smart-name '#{pane_current_command}' '#{pane_current_path}' '#{pane_id}')"

# set the default title format
set-option -g set-titles-string "#T - #W"

# disabled activity monitoring
setw -g monitor-activity off
set -g visual-activity off

# Rather than constraining window size to the maximum size of any client
# connected to the *session*, constrain window size to the maximum size of any
# client connected to *that window*. Much more reasonable.
setw -g aggressive-resize on

######################
#### Key Bindings ####
######################

# keep CWD when opening new window
unbind c
bind c new-window -c "#{pane_current_path}"

# tile all windows
unbind =
bind = select-layout tiled

# reload config file
bind r source-file ~/.config/tmux/tmux.conf \; display "Config Reloaded!"

# split window and fix path for tmux 1.9
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# synchronize all panes in a window
bind y setw synchronize-panes

# pane movement shortcuts
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

# Resize pane shortcuts
bind -r H resize-pane -L 10
bind -r J resize-pane -D 10
bind -r K resize-pane -U 10
bind -r L resize-pane -R 10

# open lazygit in a new window
bind-key g display-popup -w "80%" -h "80%" -d "#{pane_current_path}" -E "lazygit"

bind-key y display-popup -E -w 90% -h 70% "fleet"

# jump to next waiting agent pane
bind-key n run-shell "fleet next"

# toggle the status bar
bind-key -T prefix T set-option -g status

unbind s
# bind-key "s" display-popup -E -w 40% "sesh connect \"$(
#  sesh list -i | gum filter --limit 1 --no-sort --fuzzy --placeholder 'Pick a sesh' --height 50 --prompt='⚡'
# )\""

bind s display-popup -E -w 90% -h 70% "tm"

# more settings to make copy-mode more vim-like
unbind [
bind Escape copy-mode
unbind p
bind p paste-buffer
bind -T copy-mode-vi v send -X begin-selection

# Clean up stale agent status files from previous tmux server
run-shell "fleet reconcile >/dev/null 2>&1 &"

# Load local theme plugin
run-shell "$DOTFILES/config/tmux/theme/theme.tmux"

# Nudge sketchybar's center window-title when the active pane changes —
# AeroSpace only sees macOS window focus, not tmux pane switches. The short
# sleep lets tmux's terminal-title escape reach Ghostty before aerospace
# re-reads it. (-b = background, non-blocking; no-op if sketchybar absent.)
set-hook -ga after-select-pane 'run-shell -b "sleep 0.2; sketchybar --trigger aerospace_focus_change 2>/dev/null || true"'
set-hook -ga after-select-window 'run-shell -b "sleep 0.2; sketchybar --trigger aerospace_focus_change 2>/dev/null || true"'
set-hook -ga client-session-changed 'run-shell -b "sleep 0.2; sketchybar --trigger aerospace_focus_change 2>/dev/null || true"'

if-shell "[ -z \"$TMUX_MINIMAL\" ]" {
  set -g status on
} {
  set -g status off
  set-hook -g after-new-window      'if "[ #{session_windows} -gt 1 ]" "set status on"'
  set-hook -g after-kill-pane       'if "[ #{session_windows} -lt 2 ]" "set status off"'
  set-hook -g pane-exited           'if "[ #{session_windows} -lt 2 ]" "set status off"'
  set-hook -g window-layout-changed 'if "[ #{session_windows} -lt 2 ]" "set status off"'
}


run-shell "fleet statusline --inject" # fleet-managed
bind-key f split-window -hbf -l 34 fleet # fleet-managed
