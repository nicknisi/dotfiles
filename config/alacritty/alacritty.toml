# alacritty.toml — 对应 config/wezterm/wezterm.lua
# 源文件在 dotfiles 仓库；Windows 侧软链到 %APPDATA%\alacritty\（见安装步骤）
# install.sh link 也会软链到 ~/.config/alacritty/（供 WSLg 备用）

# ── Shell (WSL) ──────────────────────────────────────────────
# wezterm.lua: default_prog = { "powershell.exe" }, launch_menu 含 WSL
# Alacritty 无 launch_menu，默认直接进 WSL（贴合 dotfiles 工作流）
[terminal]
shell = { program = "wsl.exe", args = ["~", "-d", "Ubuntu-22.04"] }

# ── 环境变量 ─────────────────────────────────────────────────
# TERM=alacritty 经验证可用（infocmp alacritty 成功，Linuxbrew ncurses 6.6）。
# TrueColor 由 COLORTERM=truecolor (zshenv) + tmux alacritty:Tc override 双重保证，
# 不依赖 terminfo 内建的 Tc（alacritty 条目仅含 initc，256 色）。
[env]
TERM = "alacritty"

# ── 字体 ─────────────────────────────────────────────────────
# wezterm.lua: font = JetBrainsMono Nerd Font, font_size = 14.0
[font]
size = 14.0

[font.normal]
family = "JetBrainsMono Nerd Font"

# ── 窗口 ─────────────────────────────────────────────────────
# wezterm.lua: window_padding=6, initial_cols=120, initial_rows=28,
#              window_decorations="RESIZE"
[window]
padding = { x = 2, y = 2 }
dimensions = { columns = 120, lines = 28 }
# Windows 上 Alacritty 只有 Full / None。"Full" = 完整标题栏 + 可拖拽缩放边框。
decorations = "Full"

# Campbell: https://github.com/alacritty/alacritty-theme/blob/master/themes/campbell.toml
[colors.primary]
background = '#0c0c0c'
foreground = '#cccccc'


# Normal colors
[colors.normal]
black      = '#0c0c0c'
red        = '#c50f1f'
green      = '#13a10e'
yellow     = '#c19c00'
blue       = '#0037da'

magenta    = '#881798'
cyan       = '#3a96dd'
white      = '#cccccc'

# Bright colors
[colors.bright]
black      = '#767676'
red        = '#e74856'
green      = '#16c60c'
yellow     = '#f9f1a5'
blue       = '#3b78ff'
magenta    = '#b4009e'
cyan       = '#61d6d6'
white      = '#f2f2f2'

# ── URL hints: Ctrl+点击打开链接 (wezterm.lua: Ctrl+Left OpenLink) ──
[[hints.enabled]]
regex = '(ipfs:|ipns:|magnet:|mailto:|gemini:|gopher:|https:|http:|news:|file:|git:|ssh:|ftp:)[^\u{0000}-\u{001F}\u{007F}-\u{009F}<>"\s\-]+'
hyperlinks = true
post_processing = true
persist = false
mouse.enabled = true
mouse.mods = "Control"
# Alacritty 是 Windows 进程，hint command 在 Windows 侧执行 → 默认浏览器打开
command = { program = "cmd.exe", args = ["/c", "start", ""] }

# ── 实时重载 ────────────────────────────────────────────────
[general]
live_config_reload = true

[keyboard]
bindings = [
{ key = "N", mods = "Control|Shift", action = "CreateNewWindow" },
]
